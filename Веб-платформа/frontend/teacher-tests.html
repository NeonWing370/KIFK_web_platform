<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тести викладача | CodeStudy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="teacher-tests">
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="dashboard-shell">
    <aside class="dashboard-sidebar" id="dashboardSidebar">
      <div class="sidebar-brand">
        <span class="brand-mark">CS</span>
        <a class="brand" href="index.html"><span>CodeStudy</span></a>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-link danger" id="logoutButton" type="button">Вийти</button>
      </div>
    </aside>

    <div class="dashboard-main">
      <header class="dashboard-topbar">
        <button class="menu-button" id="menuButton" aria-label="Відкрити меню">
          <span></span><span></span><span></span>
        </button>
        <h1>Тести</h1>
        <span class="user-chip" id="userChip"></span>
      </header>

      <main class="dashboard-content">
        <p class="auth-subtitle">Створюйте, редагуйте, видаляйте тести та переглядайте аналітику успішності студентів.</p>

        <article class="content-panel teacher-form-panel">
          <h3 id="testFormTitle">Створити тест</h3>
          <form class="form" id="testForm">
            <input type="hidden" id="editingTestId" value="">
            <label>
              Курс
              <select id="testCourse" required></select>
            </label>
            <label>
              Назва тесту
              <input id="testTitle" type="text" placeholder="Назва тесту" required>
            </label>
            <label>
              Прохідний бал (%)
              <input id="testPassScore" type="number" min="1" max="100" value="60" required>
            </label>
            <div id="questionsBuilder"></div>
            <button class="button ghost" type="button" id="addQuestionButton">Додати питання</button>
            <div class="hero-actions">
              <button class="button primary" type="submit" id="saveTestButton">Зберегти тест</button>
              <button class="button ghost hidden" type="button" id="cancelEditButton">Скасувати редагування</button>
            </div>
          </form>
          <p class="message" id="testMessage"></p>
        </article>

        <section class="section" style="padding: 0; margin-top: 24px;">
          <div class="section-heading">
            <h2>Ваші тести</h2>
          </div>
          <div id="testsList" class="tests-list"></div>
        </section>

        <section class="section hidden" id="analyticsSection" style="padding: 0; margin-top: 24px;">
          <div class="section-heading">
            <h2 id="analyticsTitle">Аналітика тесту</h2>
          </div>
          <div id="analyticsContent"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="assets/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
