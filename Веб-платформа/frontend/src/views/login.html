<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Увійти | KIFK</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-page="login">
  <main class="auth-page">
    <section class="auth-card">
      <a class="brand" href="index.html">
        <span class="brand-mark">K</span>
        <span>KIFK</span>
      </a>
      <h1>З поверненням</h1>
      <p class="auth-subtitle">Увійдіть до свого облікового запису KIFK і відкрийте особисту панель.</p>

      <form class="form" id="loginForm" autocomplete="off">
        <label>
          Email
          <input id="email" type="email" placeholder="Адреса email" autocomplete="off" required>
        </label>
        <label>
          Пароль
          <span class="input-wrap">
            <input id="password" type="password" placeholder="Пароль" autocomplete="new-password" required>
            <button class="password-toggle" type="button" data-target="password" aria-label="Показати пароль">Показати</button>
          </span>
        </label>
        <div class="auth-forgot">
          <a href="index.html">Забули пароль?</a>
        </div>
        <button class="button primary full" type="submit" id="loginSubmit">Увійти</button>
      </form>

      <p class="auth-link">Немає облікового запису? <a href="register.html">Створити безкоштовно</a></p>
      <p class="message" id="message"></p>
    </section>
  </main>

  <script src="assets/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
